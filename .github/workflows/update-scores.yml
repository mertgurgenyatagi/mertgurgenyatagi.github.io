name: Auto-Update Scores

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  update-scores:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch results from football-data.org
        env:
          FD_API_KEY: ${{ secrets.FD_API_KEY }}
        run: node scripts/fetch-scores.js

      - name: Commit and push if changed
        id: git-push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kupatakip/results.json kupatakip/form.json
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update scores"
            git push
            echo "pushed=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Pages deploy
        if: steps.git-push.outputs.pushed == 'true'
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches" \
            -d '{"ref":"main"}'
