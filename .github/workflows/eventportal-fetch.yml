name: EventPortal - Fetch Daily

on:
  schedule:
    - cron: '0 1 * * *' # 01:00 UTC = 04:00 Istanbul
  workflow_dispatch:
    inputs:
      date:
        description: 'Override target date (YYYY-MM-DD) -- for backfilling a missed run'
        required: false

permissions:
  contents: write
  actions: write

concurrency:
  group: eventportal-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch target day and merge into pool
        working-directory: scripts/eventportal
        env:
          TARGET_DATE: ${{ github.event.inputs.date }}
        run: node fetch-daily.js

      - name: Commit and push if changed
        id: git-push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add eventportal/data/events.json eventportal/data/status.json scripts/eventportal/data/canonical-index.json
          if ! git diff --staged --quiet; then
            git commit -m "EventPortal: fetch $(date -u +%Y-%m-%d) target day"
            git pull --rebase
            git push
            echo "pushed=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Pages deploy
        if: steps.git-push.outputs.pushed == 'true'
        run: |
          PUSHED_SHA=$(git rev-parse HEAD)
          for i in $(seq 1 10); do
            REMOTE_SHA=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/commits/main" | jq -r .sha)
            [ "$REMOTE_SHA" = "$PUSHED_SHA" ] && break
            sleep 2
          done
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches" \
            -d '{"ref":"main"}'
