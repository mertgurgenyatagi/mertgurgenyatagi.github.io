name: EventPortal - Score Daily

on:
  schedule:
    - cron: '0 6 * * *' # 06:00 UTC = 09:00 Istanbul
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: eventportal-score
  cancel-in-progress: false

jobs:
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Score newly-seen events
        working-directory: scripts/eventportal
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node score-events.js

      - name: Commit and push if changed
        id: git-push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add eventportal/data/events.json eventportal/data/status.json scripts/eventportal/data/taste-cache.json eventportal/data/taste-progress.json
          if ! git diff --staged --quiet; then
            git commit -m "EventPortal: score new events"
            git pull --rebase
            git push
            echo "pushed=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Pages deploy
        if: steps.git-push.outputs.pushed == 'true'
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches" \
            -d '{"ref":"main"}'
